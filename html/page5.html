<!DOCTYPE html>
<html lang="vi">
<head> 
    <title>In Bảng Cửu Chương</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../css/style5.css">
</head>
<body>
    <div class="container">
        <form id="frmBangcc">
            <label>Nhập vào 1 số: </label>
            <input type="text" id="txtSo" value="5">
            <input type="button" id="btIn" value="In" onclick="inBangCC()">
        </form>
    </div>
    
    <br>
    <div id="kq"></div>
          
    <script>
        function inBangCC() {
            const myForm = document.forms["frmBangcc"];
            let myNum = parseInt(myForm.elements[0].value);
            let kq = "";
            
            for (let i = 1; i <= 10; i++) {
                kq += myNum + " x " + i + " = " + (myNum * i) + "<br>";
            }
            
            document.getElementById("kq").innerHTML = kq;
        }
    </script>
</body>
</html>
